        .window-card {
            background: var(--card-bg); border: 3px solid var(--main-black);

            display: flex; flex-direction: column; text-decoration: none; color: inherit;

        .window-bar {
            border-bottom: 3px solid var(--main-black);

        .dot { width: 8px; height: 8px; border-radius: 50%; border: 2px solid var(--main-black); background: #fff; }

        .img-space { width: 100%; aspect-ratio: 4 / 3; border-bottom: 3px solid var(--main-black); background: #eee; overflow: hidden; }

        .txt-space { padding: 12px; flex-grow: 1; }
        .badge {

.txt-space h3 {

<script>
const BLOG_URL = 'https://narunikki.hatenablog.com/rss';
const API_URL = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(BLOG_URL)}&_=${Date.now()}`;

let allArticles = [];

function isHatenaAutoEyecatch(url) {
  if (!url) return false;

  try {
    const parsed = new URL(url, window.location.href);
    const host = parsed.hostname;
    const path = parsed.pathname;

    return host === 'ogimage.blog.st-hatena.com' ||
      path.includes('/images/og-image') ||
      path.includes('/images/entry-image');
  } catch {
    return false;
  }
}

function resolveArticleImage(item) {
  const enclosureImage = item.enclosure && item.enclosure.link
    ? item.enclosure.link
    : '';

  if (enclosureImage) {
    return isHatenaAutoEyecatch(enclosureImage)
      ? 'NoImage.png'
      : enclosureImage;
  }

  if (item.thumbnail && !isHatenaAutoEyecatch(item.thumbnail)) {
    return item.thumbnail;
  }

  return 'NoImage.png';
}

// ===== 人気記事 =====
const popularArticles = [

    link: "https://narunikki.hatenablog.com/entry/2026/03/16/120000",

    categories: ["ポケモン"],
    isPopular: true
  },
  {

    link: "https://narunikki.hatenablog.com/entry/2026/03/12/120000",
    image: "./denki.jpeg",
    categories: ["ポケモン"],
    isPopular: true
  },
  {
    title: "イルミネーションライトは発電力に影響しない？100個以上接続した検証結果",
    link: "https://narunikki.hatenablog.com/entry/2026/03/25/120000",
    image: "./irumi.jpeg",
    categories: ["ポケモン"],
    isPopular: true
  },
  {
    title: "絵の具を損しない使い方！効率よく塗るコツまとめ",
    link: "https://narunikki.hatenablog.com/entry/2026/03/23/120000",
    image: "./enogu.jpg",
    categories: ["ポケモン"],
    isPopular: true
  }
];

// ===== PR =====
const travelAds = [
  {
    title: "遠征・旅行なら楽天トラベルでお得に予約",
    link: "https://af.moshimo.com/af/c/click?a_id=5409331&p_id=55&pc_id=55&pl_id=635",
    image: "airplane.png",
    categories: ["遠征"],
    isAd: true
  },
  {
    title: "Yahoo!トラベルでホテル比較",
    link: "https://ck.jp.ap.valuecommerce.com/servlet/referral?sid=3764505&pid=892591298",
    image: "airport.png",
    categories: ["遠征"],
    isAd: true
  }
];

const toolCards = [
  {
    title: "ぽこあポケモン図鑑ツール",

    image: "pokoa.png",
    categories: ["ポケモン"]
  }
];

const oshiAds = [
  {
    title: "私も使ってる！軽くてよく見える推し活双眼鏡",
    link: "https://hb.afl.rakuten.co.jp/ichiba/52a6174f.0ba0a7c4.52a61750.b062a46d/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Flachaceshop%2Fnf65xajdzjsmt5sxb64eqzrhqa%2F",
    image: "https://thumbnail.image.rakuten.co.jp/@0_mall/lachaceshop/cabinet/12227175/33711203_4.jpg",
    categories: ["推し活"],
    isAd: true
  }
];

const nintendoOnlineAd = [
  {
    title: "【重要】ぽこあでクラウド島に行くならニンテンドーオンライン加入が必須！詳細はこちら",
    link: "https://hb.afl.rakuten.co.jp/ichiba/52115d6f.24bac8ef.52115d70.1a99eaf4/?pc=https%3A%2F%2Fitem.rakuten.co.jp%2Frdownload%2F802550321%2F&link_type=hybrid_url&ut=eyJwYWdlIjoiaXRlbSIsInR5cGUiOiJoeWJyaWRfdXJsIiwic2l6ZSI6IjEwMHgxMDAiLCJuYW0iOjEsIm5hbXAiOiJyaWdodCIsImNvbSI6MSwiY29tcCI6ImRvd24iLCJwcmljZSI6MSwiYm9yIjoxLCJjb2wiOjEsImJidG4iOjEsInByb2QiOjAsImFtcCI6ZmFsc2V9",

    categories: ["ポケモン"],
    isAd: true
  }
];

const netOffAd = [
  {
    title: "【片付け】1,000円から買取OK！本やゲーム、CDをまとめて送ってスッキリ",

    isNetOff: true
  }
];

// ===== 固定記事（RSSに載らない場合の補完） =====
const fixedArticles = [
  {
    title: "空港ラウンジはゴールドカードで使える？母娘遠征でのリアル体験談",
    link: "https://narunikki.hatenablog.com/entry/2026/03/31/200000",
    image: "https://cdn-ak.f.st-hatena.com/images/fotolife/e/erupyon/20260304/20260304120505.png",
    categories: ["推し活遠征ログ"]
  },
  {
    title: "【地方民の遠征術】飛行機予約はどこでする？安さより「体調と安心」を優先する私のマイルール",
    link: "https://narunikki.hatenablog.com/entry/2026/03/24/200000",
    image: "https://cdn-ak.f.st-hatena.com/images/fotolife/e/erupyon/20260304/20260304135315.png",
    categories: ["推し活遠征ログ"]
  },
  {

    link: "https://narunikki.hatenablog.com/entry/2026/03/19/200000",
    image: "https://cdn-ak.f.st-hatena.com/images/fotolife/e/erupyon/20260304/20260304120505.png",
    categories: ["推し活遠征ログ"]
  }
];

// ===== 共通：2番目以降に差し込み =====
function insertAfterFirst(base, inserts) {
  const result = [...base];
  inserts.forEach(item => {
    const index = Math.floor(Math.random() * result.length) + 1;
    result.splice(index, 0, item);
  });
  return result;
}

// ===== 人気記事は固定位置 =====
function insertPopular(base) {
  const result = [...base];
  const positions = [1, 3, 5, 7];
  popularArticles.forEach((item, i) => {
    const index = Math.min(positions[i], result.length);
    result.splice(index, 0, item);
  });
  return result;
}

// ===== RSS取得（修正済） =====
async function fetchRSS() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (data.status === 'ok') {
      allArticles = data.items.map(item => {
        return {
          ...item,
          image: resolveArticleImage(item)
        };
      });

// RSS取得後に固定記事を追加
allArticles = [...allArticles, ...fixedArticles];

      // 最初の表示を「最新情報」タブの処理として実行
      const allBtn = document.querySelector('.tab-btn[onclick*="all"]');
      filterByKeyword('all', allBtn);
    }
  } catch {
    document.getElementById('article-grid').innerHTML =
      '<div class="status-msg">エラー</div>';
  }
}

// ===== 描画 =====
function render(list) {
  const grid = document.getElementById('article-grid');
  grid.innerHTML = '';

  list.forEach(item => {
    const categories = item.categories || [];
    const isGame = categories.some(c => c.includes('ポケモン'));
    const isTravel = categories.some(c => c.includes('遠征'));
    const isOshi = categories.some(c => c.includes('推し活'));

    let color = 'var(--window-yellow)';
    if (isGame) color = 'var(--window-green)';
    else if (isTravel || isOshi) color = 'var(--window-purple)';

    const tag =
      item.isAd ? 'PR' :
      item.isPopular ? '★人気' :
      (categories[0] || 'DIARY');

    grid.insertAdjacentHTML('beforeend', `
      <a href="${item.link}" target="_blank" class="window-card">
        <div class="window-bar" style="background:${color}">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
        <div class="img-space">
          <img src="${item.image}" onerror="this.onerror=null;this.src='NoImage.png'">
        </div>
        <div class="txt-space">
          <span class="badge" style="background:${color}">${tag}</span>
          <h3>${item.title}</h3>
        </div>
      </a>
    `);
  });
}

// ===== フィルタ =====
function filterByKeyword(keyword, btn) {
  if (btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  let filtered = keyword === 'all'
    ? [...allArticles]
    : allArticles.filter(item =>
        item.categories && item.categories.some(c => c.includes(keyword))
      );

  // ⭐ 最新（all）の時の処理
  if (keyword === 'all') {
    filtered = insertPopular(filtered);
    if (filtered.length >= 2) {
      filtered.splice(1, 0, nintendoOnlineAd[0]); 
    }
    if (filtered.length >= 5) {
      filtered.splice(4, 0, netOffAd[0]); 
    }
  }

  // ⭐ ポケモンタブの時の処理
  if (keyword === 'ポケモン') {
    filtered = insertPopular(filtered);
    filtered = insertAfterFirst(filtered, toolCards);
    filtered.splice(0, 0, nintendoOnlineAd[0]);
  }

  // ⭐ その他のタブ
  if (keyword === '遠征') {
    filtered = insertAfterFirst(filtered, travelAds);
  }
  if (keyword === '推し活') {
    filtered = insertAfterFirst(filtered, oshiAds);
  }

  render(filtered);
}

fetchRSS();
</script>
